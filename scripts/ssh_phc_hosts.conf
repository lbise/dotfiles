# SSH config snippet included by ~/.ssh/config.
# Machine pool for ssh_phc.sh. Comments after Host lines are shown in fzf.
# Add entries manually as:
#   Host short-machine-name # description

Host ch03wxpevb12 # Leo
Host ch03wxuboard311 # Leo
Host ch03wxuboard310 # Mauro
Host ch03wxuboard316 # Antoine

# Keep already-qualified work FQDNs from being expanded again by Host ch03*.
Host *.corp.ads
  HostName %h

# Defaults for PHC short host aliases. Keep this after the machine pool.
Host ch03*
  HostName %h.corp.ads
  User 13lbise
  ForwardX11 yes
  ForwardAgent yes
  ServerAliveInterval 30
  ServerAliveCountMax 3
  TCPKeepAlive yes
